spring.application.name=zesportal

# H2 Database – zapis w pliku (dane przetrwają restart)
spring.datasource.url=jdbc:h2:file:./data/zesportal
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (podgląd bazy w przeglądarce: /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate – update = schemat aktualizowany, dane zachowane
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Tryb testowy JOLT: true / tak / yes = symulacja połączenia i wywołań Tuxedo (bez rzeczywistego połączenia)
# Ustaw test.jolt=false i umieść jolt.jar w katalogu lib/, aby używać prawdziwego połączenia JOLT.
test.jolt=true
