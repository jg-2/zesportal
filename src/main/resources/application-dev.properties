# Profil dev/demo – wygodny do pokazów i developmentu

# Baza w pliku (dane przetrwają restart – lepsze do demo)
spring.datasource.url=jdbc:h2:file:./data/zesportal
spring.datasource.username=sa
spring.datasource.password=

# Konsola H2 – podgląd bazy w przeglądarce
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Schemat aktualizowany, nie odtwarzany od zera
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logowanie – więcej informacji
logging.level.pl.pekao.zesportal=DEBUG
logging.level.org.springframework.web=INFO
