spring.application.name=zesportal

# H2 Database – zapis w pliku (dane przetrwają restart)
spring.datasource.url=jdbc:h2:file:./data/zesportal
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (podgląd bazy w przeglądarce: /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate – update = schemat aktualizowany, dane zachowane
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Tryb testowy JOLT: true / tak / yes = symulacja połączenia i wywołań Tuxedo (bez rzeczywistego połączenia)
test.jolt=true

# Pula sesji JOLT (per komponent): rozmiar i czas bezczynności
jolt.pool.max-size=10
jolt.pool.idle-timeout-seconds=300
jolt.pool.borrow-timeout-seconds=30
jolt.pool.idle-check-interval-ms=60000

# Katalog zapisu plików dla zadań typu SAVE_FILE (wyniki zadań)
task.save-file.output-dir=./data/task-results

# Katalog plików batch (duża parametersList z „Wczytanie z pliku” – gdy nie mieści się w task.config)
task.batch-data-dir=./data/batch

# Katalog pełnych wyników zadań (gdy result nie mieści się w kolumnie 32k)
task.result-file-dir=./data/task-results-json

# Upload plików (Wczytanie z pliku) – domyślny limit Spring to 1 MB, przy większym pliku = "Upload forbidden"
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Vaadin 24.6: wyciszenie powtarzających się logów "Ignored listener invocation for ui-poll event" (znany błąd przy pollingu + dialog modal)
logging.level.com.vaadin.flow.internal.nodefeature=WARN
